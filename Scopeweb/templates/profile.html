<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style1.css' %}">
     <link href="https://fonts.googleapis.com/css2?family=Viga&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <title>Document</title>
    <style>

 #popup-container {
    position: fixed;
    top: 30px;
    margin-left: 40%;
    text-align: center;
    z-index: 9999;
}

/* Popup box */
.popup {
    padding: 15px 20px;
    margin-top: 10px;
    border-radius: 8px;
    color: white;
    font-family: "Poppins", sans-serif;
    font-size: 15px;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(-10px);
    animation: popin 1s forwards;
}

/* Colors based on message type */
.popup.info {
    background: #10224f;
}
.popup.success {
    background: #06a026;
}
.popup.warning {
    background: #e0a400;
}
.popup.error {
    background: #cc0000;
}

/* Smooth animation */
@keyframes popin {
    100% {
        opacity: 1;
        transform: translateY(0px);
    }
}
 #edit_container
 {
  /* position: fixed; */
  background-color:#061146f2;
  width: 100%;
  /* margin:20px ; */
  padding: 20px 0 ;
  
  /* margin-left: 20%; */
  /* border-radius: 30px;
  margin-bottom: 20px; */
 }
 #edit_container ul
 {
   display: flex;
   text-align: center;
   column-gap: 20px;
   margin-left: 43%;

 }
 #edit_container ul li{
    list-style: none;
 }
 #edit_container ul li a{
    text-decoration: none;
    font: 20px 'viga';
    border: 1px solid goldenrod;
    padding: 5px 10px;
    border-radius: 20px;
    color: white;
 }
 #edit_container ul li a:hover{
    background-color: goldenrod;
    color: #10224f;
 }
#edit_container ul li a.active{
    background-color: goldenrod;
    color: #10224f;
 }
 #regdiv a{
    text-decoration: none;
    color: white;
 }
 #but{
    font:20px 'viga' ;
    padding: 15px 30px;
    border-radius: 40px;
    background-color:  rgb(185, 151, 40);
    color: rgb(21, 45, 92);
    border: 2px solid rgb(183, 151, 46);
 }
#but:hover {
    background-color: rgb(248, 247, 243);
    color: #10224f;
}

    </style>
</head>
<body>
    <div id="popup-container">
    {% if messages %}
        {% for message in messages %}
            <div class="popup {{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
</div>
   <div class="update">
    <div id="edit_container" >
             
            <ul id="edit-tag">
                <li>
                    
                     <a class="active" href="{% url 'profile' %}"  >Details </a>
                   
                </li>
                <li>
                     <a href="{% url 'password_update' %} " >Password</a>
                </li>
                 
            </ul>
        </div>
          
           
    
    <form id="upform" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div id="goback">
        <a href="{% url 'dashboard' %}" style="text-decoration: none;color: white;background-color: #7f808801;float: left;border-radius: 10px;padding: 10px 15px; border: 2px solid gold;margin-left: -100px;font-family:'viga';position: fixed;"><img src="../static/images/arrow_back_ios_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" width="15px" style="margin-top: 5px;"></a>
    </div>
        <div id="formdiv">
           {% for field in form %}
        <div id="regdiv">
         
    
                    <h4 style="margin-bottom: 20px;">
                       {{field.label_tag}}
                     </h4>
                
                    <h4>
                        {{field}}
                    </h4>
                    <p>{{field.errors}}</p>
                
         
        </div>
        {% endfor %}
        </div>
        <div style="text-align: center;width: auto; padding: 20px;">
        <button id="but" type="submit" >
            Submit
        </button>
        </div>
    </form>
</div>
   <script>
    setTimeout(function() {
        let popups = document.querySelectorAll(".popup");
        popups.forEach(function(popup) {
            popup.style.transition = "all 0.5s ease";
            popup.style.opacity = "0";
            popup.style.transform = "translateY(-20px)";
            setTimeout(() => popup.remove(), 500);
        });
    }, 3000);  // Close after 3 sec
</script>
</body>
</html>
