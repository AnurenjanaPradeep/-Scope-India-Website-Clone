<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style1.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <title>Set Password</title>

    <style>
        #studentlogin{
            background-color: #081035;
        }

        .btn {
            border-radius: 10px;
            background-color: #c7ac20;
            border: 2px solid #10224f;
            color: white;
        }

        label { color:black; }

        #popup-container {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            text-align:center;
        }

        .popup {
            padding: 15px 20px;
            margin-top: 10px;
            border-radius: 8px;
            color: white;
            font-family: "Poppins", sans-serif;
            font-size: 15px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateY(-10px);
            animation: popin 1s forwards;
        }

        .popup.success { background:#06a026; }
        .popup.error { background:#cc0000; }
        .popup.warning { background:#e0a400; }
        .popup.info { background:#10224f; }

        @keyframes popin {
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <div id="popup-container">
        {% if messages %}
            {% for message in messages %}
                <div class="popup {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    </div>

    <section id="studentlogin" class="vh-100 d-flex justify-content-center align-items-center">
        <div class="container">
            <div class="row justify-content-center">

                <!-- FORM CARD -->
                <div class="col-md-5">
                    <div class="text-center mb-3">
                        <img src="../static/images/scopeindia-logo.webp" width="150">
                    </div>

                    <div class="p-4" style="border:2px solid #c7ac20; border-radius:20px; background:white;">
                        <form method="POST">
                            {% csrf_token %}

                            <h3 class="fw-bold text-center mb-4" style="color:black;">Set Password</h3>

                            <div class="mb-3">
                                <label>Password</label>
                                <input type="password" class="form-control form-control-lg" name="password" required>
                            </div>

                            <div class="mb-3">
                                <label>Confirm Password</label>
                                <input type="password" class="form-control form-control-lg" name="cpassword" required>
                            </div>

                            <div class="pt-1 mb-3">
                                <button class="btn btn-lg w-100" type="submit">Save Password</button>
                            </div>

                        </form>
                    </div>
                </div>

                

            </div>
        </div>
    </section>
</body>
</html>
